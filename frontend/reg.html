<!DOCTYPE html>
<html>

<head>
    <title>Higgs Student App


    </title>

    <style>
        body {
            font-family: 'Segoe UI', sans-serif;
            background: linear-gradient(135deg, #0f172a, #020617);
            color: #e2e8f0;
            margin: 0;
            padding: 0;
        }

        .container {
            max-width: 1000px;
            margin: auto;
            padding: 20px;
        }

        .title {
            text-align: center;
            margin-bottom: 20px;
            color: #3b82f6;
        }

        /* CARDS */
        .card {
            background: rgba(30, 41, 59, 0.7);
            padding: 20px;
            margin-bottom: 20px;
            border-radius: 12px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.3);
            backdrop-filter: blur(10px);
        }

        /* GRID */
        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 10px;
        }

        .row {
            display: flex;
            gap: 10px;
        }

        /* INPUTS */
        input {
            padding: 10px;
            border-radius: 6px;
            border: none;
            background: #020617;
            color: white;
            outline: none;
        }

        /* BUTTONS */
        button {
            padding: 10px;
            border-radius: 6px;
            border: none;
            background: #3b82f6;
            color: white;
            cursor: pointer;
            transition: 0.2s;
        }

        button:hover {
            background: #2563eb;
            transform: scale(1.03);
        }

        /* STATUS */
        .status {
            font-weight: bold;
        }

        .success { color: #22c55e; }
        .error { color: #ef4444; }
        .info { color: #3b82f6; }

        /* STUDENTS */
        .student-grid {
            margin-top: 10px;
        }

        .student-card {
            background: #020617;
            padding: 10px;
            margin: 10px 0;
            border-radius: 8px;
        }
    </style>
</head>

<body>

    <h2>STEP 1: REGISTRATION</h2>
    <input id="regName" placeholder="Name">
    <input id="regEmail" placeholder="Email">
    <input id="regPassword" placeholder="Password" type="password">
    <button onclick="register()">Register</button>

    <p>Already Have An Account! click here...<a href="index.html">Login</a></p>

    <pre id="output"></pre>

    <hr>

    <script src="./scripts.js"></script>

</body>

</html>
