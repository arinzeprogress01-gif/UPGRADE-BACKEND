<!DOCTYPE html>
<html>

<head>
    <title>Higgs Student App


    </title>

    <style>
        body {
            font-family: 'Segoe UI', sans-serif;
            background: linear-gradient(135deg, #0f172a, #020617);
            color: #e2e8f0;
            margin: 0;
            padding: 0;
        }

        .container {
            max-width: 1000px;
            margin: auto;
            padding: 20px;
        }

        .title {
            text-align: center;
            margin-bottom: 20px;
            color: #3b82f6;
        }

        /* CARDS */
        .card {
            background: rgba(30, 41, 59, 0.7);
            padding: 20px;
            margin-bottom: 20px;
            border-radius: 12px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.3);
            backdrop-filter: blur(10px);
        }

        /* GRID */
        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 10px;
        }

        .row {
            display: flex;
            gap: 10px;
        }

        /* INPUTS */
        input {
            padding: 10px;
            border-radius: 6px;
            border: none;
            background: #020617;
            color: white;
            outline: none;
        }

        /* BUTTONS */
        button {
            padding: 10px;
            border-radius: 6px;
            border: none;
            background: #3b82f6;
            color: white;
            cursor: pointer;
            transition: 0.2s;
        }

        button:hover {
            background: #2563eb;
            transform: scale(1.03);
        }

        /* STATUS */
        .status {
            font-weight: bold;
        }

        .success { color: #22c55e; }
        .error { color: #ef4444; }
        .info { color: #3b82f6; }

        /* STUDENTS */
        .student-grid {
            margin-top: 10px;
        }

        .student-card {
            background: #020617;
            padding: 10px;
            margin: 10px 0;
            border-radius: 8px;
        }
    </style>
</head>

<body style="margin:0; font-family:Arial;">

<div style="display:flex; min-height:100vh;">

    <!-- 🔵 SIDEBAR -->
    <div style="width:220px; background:#020617; color:white; padding:20px;">
        <h2>🎓HIGGS </h2>

        <button onclick="showSection('home')">🏠 Dashboard</button>
        <button onclick="showSection('profile')">👤 My Profile</button>
        <button onclick="showSection('admin')">📊 Admin</button>
        <button onclick="showSection('form')">✏️ Manage Student</button>

        <hr>

        <button onclick="logout()">🚪 Logout</button>
    </div>

    <!-- ⚪ MAIN CONTENT -->
    <div style="flex:1; padding:20px; background:#0f172a; color:white;">

        <span id="welcome"></span>

        <h1>/STUDENT SECTION DASHBOARD/</h1>

        <!-- 🏠 HOME -->
        <div id="homeSection">
            <p>Welcome to Higgs Student System</p>
        </div>

        <!-- 👤 PROFILE -->
        <div id="profileSection" style="display:none;">
            <h2>GET YOUR DATA</h2>

            <input id="searchId" placeholder="Enter student ID">
            <button onclick="getProfile()">Get Student By ID</button>

            <div id="output"></div>
        </div>

        <!-- 📊 ADMIN -->
        <div id="adminSection" style="display:none;">
            <h2>GET STUDENT LIST [ ADMIN ]</h2>

            <button onclick="getStudents()">Load Students</button>

            <div id="students"></div>
        </div>

        <hr>

        <!-- CREATE -->
    <!-- FORM SECTION -->
    <div id="formSection" style="display:none;">
    
        <h2>CREATE STUDENT</h2>
    
        <input id="name" placeholder="Name">
        <input id="studentClass" placeholder="Class">
        <input id="course" placeholder="Course">
        <input id="gender" placeholder="Gender">
        <input id="age" placeholder="Age">
    
        <button onclick="createStudent()">Create Student</button>
    
        <hr>
    
        <h2>UPDATE STUDENT</h2>
    
        <input id="updateName" placeholder="Name">
        <input id="updateClass" placeholder="Class">
        <input id="updateCourse" placeholder="Course">
        <input id="updateGender" placeholder="Gender">
        <input id="updateAge" placeholder="Age">
    
        <button onclick="updateStudent()">Update Selected Student</button>
    
    </div>
</div>

<script src="./scripts.js"></script>
</body>
</html>
